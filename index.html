<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

.bp{background:#0071e3;color:#fff}.bs{background:#f5f5f7;color:#1d1d1f;border:1px solid #d2d2d7}

.bk{position:absolute;top:18px;right:18px;font-size:22px;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}

}</style>

n AWS Step Functions workflow  that includes an Amazon Rekognition image moderation step.","B":"Use an Amazon API Gateway HTTP API with request validation templates to screen content before  storing the uploaded content in Amazon S3. Use Amazon SageMaker AI to build custom content  moderation models that process content before sending the processed content to Amazon Bedrock.","C":"Create an Amazon Cognito user pool that uses pre-authentication AWS Lambda functions to run  content moderation checks. Use Amazon Textract to filter text content and Amazon Rekognition to  filter image content before allowing users to upload content to the platform.","D":"Create an AWS Step Functions workflow that uses built-in Amazon Bedrock guardrails to filter  content. Use Amazon Comprehend PII detection to pre-process the content. Use Amazon Rekognition  image moderation."},"a":"D","e":"Therefore, Option D best satisfies content safety, PII protection, S3 integration, and minimal infrastructure management requirements.","ch":{"D":["guardrails","guardrail","PII detection"]},"wh":{"A":["Amazon CloudWatch"],"B":["Amazon SageMaker","Amazon S3","Amazon API Gateway"],"C":["Amazon Textract","Amazon Cognito","AWS Lambda"]}},{"i":6,"n":"106","c":3,"q":"A financial services company uses an AI application to process financial documents by using Amazon  Bedrock. During business hours, the application handles approximately 10,000 requests each hour, which  requires consistent throughput. The company uses the CreateProvisionedModelThroughput API to purchase provisioned throughput. Amazon  CloudWatch metrics show that the provisioned capacity is unused while on-demand requests are being  throttled. The company finds the following code in the applica","o":{"A":"Replace the model ID parameter with the ARN of the provisioned model that the","B":"CreateProvisionedModelThroughput API returns. Add exponential backoff retry logic to handle throttling exceptions during peak hours.","C":"Modify the application to use the invokeModelWithResponseStream API instead of the invokeModel","D":"API."},"a":"B","e":"Therefore, Option B directly resolves the throttling issue by correctly routing traffic to the reserved capacity and ensures that the company benefits from the provisioned throughput it has purchased.","ch":{"B":["CreateProvisionedModelThroughput"]},"wh":{"A":["model ID"],"C":["InvokeModel","InvokeModelWithResponseStream"],"D":[]}},{"i":7,"n":"93","c":0,"q":"A company uses an organization in AWS Organizations with all features enabled to manage multiple AWS  accounts. Employees use Amazon Bedrock across multiple accounts. The company must prevent specific  topics and proprietary information from being included in prompts to Amazon Bedrock models. The company  must ensure that employees can use only approved Amazon Bedrock models. The company wants to manage  these controls centrally. Which combination of solutions will meet these requirements? (Sele","o":{"A":"Create an IAM permissions boundary for each employee's IAM role. Configure the permissions  boundary to require an approved Amazon Bedrock guardrail identifier to invoke Amazon Bedrock  models. Create an SCP that allows employees to use only approved models.","B":"Create an SCP that allows employees to use only approved models. Configure the SCP to require  employees to specify a guardrail identifier in calls to invoke an approved model.","C":"Create an SCP that prevents an employee from invoking a model if a centrally deployed guardrail  identifier is not specified in a call to the model. Create a permissions boundary on each employee's  IAM role that allows each employee to invoke only approved models.","D":"Use AWS CloudFormation to create a custom Amazon Bedrock guardrail that has a block filtering  policy. Use stack sets to deploy the guardrail to each account in the organization.","E":"Use AWS CloudFormation to create a custom Amazon Bedrock guardrail that has a mask filtering  policy. Use stack sets to deploy the guardrail to each account in the organization."},"a":"C D","e":"Option D block filtering policy correctly specifies a , which is appropriate when content must be prevented entirely rather than partially redacted.","ch":{"C":["guardrail","SCP","permissions boundary"],"D":["guardrail","block filtering"]},"wh":{"A":[],"B":[],"E":["mask filtering"]}},{"i":8,"n":"103","c":1,"q":"A hotel company wants to enhance a legacy Java-based property management system (PMS) by adding AI  capabilities. The company wants to use Amazon Bedrock Knowledge Bases to provide staff with room  availability information and hotel-specific details. The solution must maintain separate access controls for  each hotel that the company manages. The solution must provide room availability information in near real  time and must maintain consistent performance during peak usage periods. Which soluti","o":{"A":"Deploy a single Amazon Bedrock knowledge base that contains combined data for all hotels. Configure  AWS Lambda functions to synchronize data from each hotel\u2019s PMS database through direct API  connections. Implement AWS CloudTrail logging with hotel-specific filters to audit access logs for  each hotel\u2019s data.","B":"Create an Amazon EventBridge rule for each hotel that is invoked by changes to the PMS database.  Configure the rule to send updates to a centralized Amazon Bedrock knowledge base in a management  AWS account. Configure resource-based policies to enforce hotel-specific access controls.","C":"Implement one Amazon Bedrock knowledge base for each hotel in a multi-account structure. Use direct  data ingestion to provide near real-time room availability information. Schedule regular synchronization  for less critical information.","D":"Build a centralized Amazon Bedrock Agents solution that uses multiple knowledge bases. Implement  AWS IAM Identity Center with hotel-specific permission sets to control staff access."},"a":"C","e":"Therefore, Option C provides the most secure, scalable, and operationally efficient solution for enhancing the PMS with Amazon Bedrock Knowledge Bases.","ch":{"C":[]},"wh":{"A":["AWS Lambda","AWS CloudTrail"],"B":[],"D":["AWS IAM","Knowledge Bases"]}},{"i":9,"n":"106","c":2,"q":"An ecommerce company operates a global product recommendation system that needs to switch between  multiple foundation models (FM) in Amazon Bedrock based on regulations, cost optimization, and  performance requirements. The company must apply custom controls based on proprietary business logic,  including dynamic cost thresholds, AWS Region-specific compliance rules, and real-time A/B testing across  multiple FMs. The system must be able to switch between FMs without deploying new code. The sys","o":{"A":"Bedrock FM IDs. Use the Lambda console to update the environment variables when business  requirements change. Configure an Amazon API Gateway REST API to read request parameters to  make routing decisions.","B":"Deploy Amazon API Gateway REST API request transformation templates to implement routing logic  based on request attributes. Store Amazon Bedrock FM endpoints as REST API stage variables. Update  the variables when the system switches between models.","C":"Configure an AWS Lambda function to fetch routing configurations from the AWS AppConfig Agent  for each user request. Run business logic in the Lambda function to select the appropriate FM for each  request. Expose the FM through a single Amazon API Gateway REST API endpoint.","D":"Use AWS Lambda authorizers for an Amazon API Gateway REST API to evaluate routing rules that  are stored in AWS AppConfig. Return authorization contexts based on business logic. Route requests to  model-specific Lambda functions for each Amazon Bedrock FM."},"a":"C","e":"Therefore, Option C provides the most scalable, flexible, and low-overhead architecture for dynamic, regulation-aware FM routing in a global GenAI system.","ch":{"C":["AWS AppConfig"]},"wh":{"A":["environment variables"],"B":["Amazon Bedrock"],"D":["Amazon Bedrock"]}},{"i":10,"n":"100","c":3,"q":"A financial services company uses multiple foundation models (FMs) through Amazon Bedrock for its  generative AI (GenAI) applications. To comply with a new regulation for GenAI use with sensitive financial  data, the company needs a token management solution. The token management solution must proactively alert when applications approach model-specific token  limits. The solution must also process more than 5,000 requests each minute and maintain token usage metrics  to allocate costs across bus","o":{"A":"estimate token usage before sending requests to Amazon Bedrock. Configure the Lambda function to  publish metrics to Amazon CloudWatch and trigger alarms when requests approach thresholds. Store  detailed token usage in Amazon DynamoDB to report costs.","B":"Implement Amazon Bedrock Guardrails with token quota policies. Capture metrics on rejected requests.  Configure Amazon EventBridge rules to trigger notifications based on Amazon Bedrock Guardrails  metrics. Use Amazon CloudWatch dashboards to visualize token usage trends across models.","C":"Deploy an Amazon SQS dead-letter queue for failed requests. Configure an AWS Lambda function to  analyze token-related failures. Use Amazon CloudWatch Logs Insights to generate reports on token  usage patterns based on error logs from Amazon Bedrock API responses. Use Amazon API Gateway to create a proxy for all Amazon Bedrock API calls. Configure request","D":"throttling based on custom usage plans with predefined token quotas. Configure API Gateway to reject  requests that will exceed token limits."},"a":"A","e":"Therefore, Option A best satisfies proactive alerting, scalability, compliance reporting, and cost allocation requirements with acceptable operational effort.","ch":{"A":["Amazon DynamoDB"]},"wh":{"B":["guardrails","guardrail"],"C":["Amazon SQS","Amazon API Gateway","AWS Lambda"],"D":[]}},{"i":11,"n":"79","c":1,"q":"A company needs a system to automatically generate study materials from multiple content sources. The  content sources include document files (PDF files, PowerPoint presentations, and Word documents) and  multimedia files (recorded videos). The system must process more than 10,000 content sources daily with  peak loads of 500 concurrent uploads. The system must also extract key concepts from document files and  multimedia files and create contextually accurate summaries. The generated study mate","o":{"A":"Use Amazon Bedrock Data Automation (BDA) with AWS Lambda functions to orchestrate document  file processing. Use Amazon Bedrock Knowledge Bases to process all multimedia. Store the content in  Amazon DocumentDB with replication. Collaborate by using Amazon SNS topic subscriptions. Track  changes by using Amazon Bedrock Agents.","B":"Use Amazon Bedrock Data Automation (BDA) with foundation models (FMs) to process document  files. Integrate BDA with Amazon Textract for PDF extraction and with Amazon Transcribe for  multimedia files. Store the processed content in Amazon S3 with versioning enabled. Store the  metadata in Amazon DynamoDB. Collaborate in real time by using AWS AppSync GraphQL  subscriptions and DynamoDB.","C":"Use Amazon Bedrock Data Automation (BDA) with Amazon SageMaker AI endpoints to host content  extraction and summarization models. Use Amazon Bedrock Guardrails to extract content from all file  types. Store document files in Amazon Neptune for time series analysis. Collaborate by using Amazon  Bedrock Chat for real-time messaging.","D":"Use Amazon Bedrock Data Automation (BDA) with AWS Lambda functions to process batches of  content files. Fine-tune foundation models (FMs) in Amazon Bedrock to classify documents across all  content types. Store the processed data in Amazon ElastiCache (Redis OSS) by using Cluster Mode  with sharding. Use Prompt management in Amazon Bedrock for version control."},"a":"B","e":"Option B best fulfills all functional, scalability, and collaboration requirements by combining purpose-built AWS services with Amazon Bedrock capabilities.","ch":{"B":["Amazon Transcribe","Amazon Textract","Amazon DynamoDB","Amazon S3"]},"wh":{"A":["Amazon SNS","AWS Lambda","knowledge base"],"C":["Amazon SageMaker","Amazon Neptune","guardrails"],"D":["Amazon ElastiCache","AWS Lambda"]}},{"i":12,"n":"106","c":0,"q":"A GenAI developer is evaluating Amazon Bedrock foundation models (FMs) to enhance a Europe-based  company's internal business application. The company has a multi-account landing zone in AWS Control  Tower. The company uses Service Control Policies (SCPs) to allow its accounts to use only the eu-north-1  and eu-west-1 Regions. All customer data must remain in private networks within the approved AWS Regions. The GenAI developer selects an FM based on analysis and testing and hosts the model in t","o":{"A":"Deploy an AWS Lambda function that is exposed by a private Amazon API Gateway REST API to a  VPC in eu-north-1. Create a VPC endpoint for the selected FM in eu-central-1 and eu-west-3. Extend  existing SCPs to allow employees to use the FM. Integrate the REST API with the business application.","B":"Deploy the FM on Amazon EC2 instances in eu-north-1. Deploy a private Amazon API Gateway REST  API in front of the EC2 instances. Configure an Amazon Bedrock VPC endpoint. Integrate the REST  API with the business application.","C":"Configure the FM to use cross-Region inference through a Europe-scoped endpoint. Configure an  Amazon Bedrock VPC endpoint. Extend existing SCPs to allow employees to use the FM through  inference profiles in Europe-based Regions where the FM is available. Use an inference profile to  integrate Amazon Bedrock with the business application.","D":"Deploy the FM in Amazon SageMaker in eu-north-1. Configure a SageMaker VPC endpoint. Extend  existing SCPs to allow employees to use the SageMaker endpoint. Integrate the FM in SageMaker with  the business application."},"a":"C","e":"Therefore, Option C is the only solution that satisfies private access, regional confinement, governance controls, and low operational overhead.","ch":{"C":["SCP","cross-Region inference","inference profile"]},"wh":{"A":["Amazon API Gateway","AWS Lambda"],"B":["Amazon API Gateway"],"D":["Amazon SageMaker"]}},{"i":13,"n":"107","c":0,"q":"A financial services company is developing a customer service AI assistant by using Amazon Bedrock. The  AI assistant must not discuss investment advice with users. The AI assistant must block harmful content,  mask personally identifiable information (PII), and maintain audit trails for compliance reporting. The AI  assistant must apply content filtering to both user inputs and model responses based on content sensitivity. The company requires an Amazon Bedrock guardrail configuration that will","o":{"A":"Configure a single guardrail and set content filters to high for all categories. Set up denied topics for  investment advice and include sample phrases to block. Set up sensitive information filters that apply  the block action for all PII entities. Apply the guardrail to all model inference calls.","B":"Configure multiple guardrails by using tiered policies. Create one guardrail and set content filters to  high. Configure the guardrail to block PII for public interactions. Configure a second guardrail and set  content filters to medium. Configure the second guardrail to mask PII for internal use. Configure  multiple topic-specific guardrails to block investment advice and set up contextual grounding checks.","C":"Configure a guardrail and set content filters to medium for harmful content. Set up denied topics for  investment advice and include clear definitions and sample phrases to block. Configure sensitive  information filters to mask PII in responses and to block financial information in inputs. Enable both  input and output evaluations that use custom blocked messages for audits.","D":"Create a separate guardrail for each use case. Create one guardrail that applies a harmful content filter.  Create a guardrail to apply topic filters for investment advice. Create a guardrail to apply sensitive  information filters to block PII. Use AWS Step Functions to chain the guardrails sequentially."},"a":"C","e":"Therefore, Option C best satisfies enforcement, flexibility, auditability, and accuracy requirements.","ch":{"C":["guardrail"]},"wh":{"A":[],"B":["guardrails"],"D":["AWS Step Functions","guardrails"]}},{"i":14,"n":"95","c":1,"q":"A financial services company needs to pre-process unstructured data such as customer transcripts, financial  reports, and documentation. The company stores the unstructured data in Amazon S3 to support an Amazon  Bedrock application. The company must validate data quality, create auditable metadata, monitor data metrics, and customize text  chunking to optimize foundation model (FM) performance. Which solution will meet these requirements with the LEAST development effort? Use Amazon SageMaker D","o":{"A":"and alarms to monitor data quality. Use a custom AWS Lambda function to pre-process the data. Load  processed data into Amazon Bedrock. Set up an AWS Glue crawler to catalog data sources. Create AWS Glue ETL jobs to run custom","B":"transformation scripts. Use AWS Glue Data Quality to validate and monitor data quality. Load  processed data into Amazon Bedrock. Use Amazon Comprehend to extract entities. Create an AWS Lambda function to chunk text. Run","C":"Amazon Athena to query and validate data quality. Load processed data into Amazon Bedrock. Create an AWS Step Functions workflow to orchestrate data pre-processing tasks. Run custom code on","D":"Amazon EC2 instances. Use Amazon SageMaker Model Monitor to monitor data quality. Load  processed data into Amazon Bedrock."},"a":"B","e":"Therefore, Option B best meets the requirements while minimizing development effort and aligning with AWS Generative AI data preparation best practices.","ch":{"B":["Amazon Comprehend"]},"w  seconds. Implement client-side load shedding.  Buffer partial results and stop new requests when application performance degrades. Set static token  usage caps for all requests. Configure exponential backoff retries, dynamic chunk sizing, and contextaware token limits."},"a":"B","e":"Therefore, Option B is the most correct and operationally safe strategy for peak-load Bedrock streaming workloads.","ch":{"B":["streaming"]},"wh":{"A":["exponential backoff"],"C":["Amazon Bedrock"],"D":["exponential backoff","Amazon Bedrock","partial results"]}},{"i":21,"n":"85","c":2,"q":"A company is using AWS Lambda and REST APIs to build a reasoning agent to automate support workflows.  The system must preserve memory across interactions, share relevant agent state, and support event-driven  invocation and synchronous invocation. The system must also enforce access control and session-based  permissions. Use Amazon Bedrock AgentCore to manage memory and session-aware reasoning. Deploy the agent  Which combination of steps provides the MOST scalable solution? (Select TWO.)","o":{"A":"with built-in identity support, event handling, and observability.","B":"Register the Lambda functions and REST APIs as actions by using Amazon API Gateway and Amazon  EventBridge. Enable Amazon Bedrock AgentCore to invoke the Lambda functions and REST APIs  without custom orchestration code.","C":"Use Amazon Bedrock Agents for reasoning and conversation management. Use AWS Step Functions  and Amazon SQS for orchestration. Store agent state in Amazon DynamoDB.","D":"Deploy the reasoning logic as a container on Amazon ECS behind API Gateway. Use Amazon Aurora  to store memory and identity data.","E":"Build a custom RAG pipeline by using Amazon Kendra and Amazon Bedrock. Use AWS Lambda to"},"a":"A B","e":"Therefore, A and B together deliver the most scalable, secure, and low-overhead solution for productiongrade reasoning agents on AWS.","ch":{"A":[],"B":["Amazon API Gateway"]},"wh":{"C":["Amazon DynamoDB dit  purposes. Configure Amazon EventBridge rules to process CloudTrail Insights anomalies and Macie  findings. Use CloudWatch alarms to trigger automated notifications and security responses when"},"a":"B","e":"Therefore, Option B best satisfies all stated requirements in a unified, auditable, and security-first architecture.","ch":{"B":["guardrail","Amazon CloudWatch"]},"wh":{"A":["Amazon S3","guardrails"],"C":["Amazon S3"],"D":["Amazon S3"]}},{"i":29,"n":"92","c":2,"q":"A company is developing a customer support application that uses Amazon Bedrock foundation models  (FMs) to provide real-time AI assistance to the company\u2019s employees. The application must display AI- generated responses character by character as the responses are generated. The application needs to support  thousands of concurrent users with minimal latency. The responses typically take 15 to 45 seconds to finish. Configure an Amazon API Gateway WebSocket API with an AWS Lambda integration. Con","o":{"A":"WebSocket API to invoke the Amazon Bedrock InvokeModelWithResponseStream API and stream  partial responses through WebSocket connections. Configure an Amazon API Gateway REST API with an AWS Lambda integration. Configure the REST","B":"API to invoke the Amazon Bedrock standard InvokeModel API and implement frontend client-side  polling every 100 ms for complete response chunks.","C":"Implement direct frontend client connections to Amazon Bedrock by using IAM user credentials and  the InvokeModelWithResponseStream API without any intermediate gateway or proxy layer.","D":"Configure an Amazon API Gateway HTTP API with an AWS Lambda integration. Configure the  HTTP API to cache complete responses in an Amazon DynamoDB table and serve the responses"},"a":"A","e":"Therefore, Option A is the only solution that fully satisfies streaming behavior, concurrency, latency, and managed-service constraints.","ch":{"A":["InvokeModelWithResponseStream","WebSocket"]},"wh":{"B":[],"C":[],"D":["Amazon DynamoD ,"AWS Lambda"],"D":["Amazon SageMaker"]}},{"i":102,"n":"104","c":2,"q":"A company is implementing a serverless inference API by using AWS Lambda. The API will dynamically  invoke multiple AI models hosted on Amazon Bedrock. The company needs to design a solution that can  switch between model providers without modifying or redeploying Lambda code in real time. The design  must include safe rollout of configuration changes and validation and rollback capabilities. Which solution will meet these requirements? Store the active model provider in AWS Systems Manager Para","o":{"A":"function to read the parameter at runtime to determine which model to invoke. Store the active model provider in AWS AppConfig. Configure a Lambda function to read the","B":"configuration at runtime to determine which model to invoke. Configure an Amazon API Gateway REST API to route requests to separate Lambda functions.","C":"Hardcode each Lambda function to a specific model provider. Switch the integration target manually. Store the active model provider in a JSON file hosted on Amazon S3. Use AWS AppConfig to","D":"reference the S3 file as a hosted configuration source. Configure a Lambda function to read the file  through AppConfig at runtime to determine which model to invoke."},"a":"B","e":"Therefore, Option B provides the most robust, scalable, and low-maintenance solution for dynamic model switching in a serverless Amazon Bedrock inference architecture.","ch":{"B":["Amazon API Gateway"]},"wh":{"A":["AWS AppConfig"],"C":["manually","Amazon S3","AWS AppConfig"],"D":[]}},{"i":103,"n":"105","c":3,"q":"A publishing company is developing a chat assistant that uses a containerized large language model (LLM)  that runs on Amazon SageMaker AI. The architecture consists of an Amazon API Gateway REST API that  routes user requests to an AWS Lambda function. The Lambda function invokes a SageMaker AI real-time  endpoint that hosts the LLM. Users report uneven response times. Analytics show that a <script>

ST={v:"quiz",idx:0,ans:{},bm:{},fcat:"all",fst:"all"};

render();

if(ST.fcat!=="all")r=r.filter(function(q){return q.c===parseInt(ST.fcat);});

else if(ST.fst==="wrong")r=r.filter(function(q){var a=ST.ans[q.i];return a&&a.w>0;});
else if(ST.fst==="weak")r=r.filter(function(q){var a=ST.ans[q.i];if(!a||a.t<2)return false;return(a.r/a.t)<0.5;});
else if(ST.fst==="bookmarked")r=r.filter(function(q){return ST.bm[q.i];});

}
function esc(s){
if(!s)return"";
var o="",i,c;
for(i=0;i<s.length;i++){
c=s.charAt(i);
if(c==="&")o+="&amp;";
else if(c==="<")o+="&lt;";
else if(c===">")o+="&gt;";
else if(c==='"')o+="&quot;";
else o+=c;
}
return o;
}
function hl(text,hls,cls){
if(!hls||!hls.length)return esc(text);
var e=esc(text);
for(var i=0;i<hls.length;i++){
var h=hls[i];
if(!h)continue;
var lo=e.toLowerCase();
var hlo=h.toLowerCase();
var idx=lo.indexOf(hlo);
if(idx>=0){
e=e.substring(0,idx)+'<span class="'+cls+'">'+e.substring(idx,idx+h.length)+'</span>'+e.substring(idx+h.length);
}
}
return e;
}
function catShort(c){

return s.substring(0,8);
}

var acc=attempts>0?Math.round((correct/attempts)*100):0;
var mastered=0,weak=0;
for(var i=0;i<k.length;i++){var a=ST.ans[k[i]];if(a.t>=2&&(a.r/a.t)>=0.8)mastered++;if(a.t>=2&&(a.r/a.t)<0.5)weak++;}
var h='<div class="hdr"><h1>AWS AIP-C01 Study</h1><span class="prog">'+answered+'/'+total+'</span></div>';
h+='<div class="cnt"><div class="home">';
h+='<h2>Dashboard</h2><p>105 questions, 5 domains</p>';
h+='<div class="sg">';
h+='<div class="sc"><div class="sv">'+acc+'%</div><div class="sl">Accuracy</div></div>';
h+='<div class="sc"><div class="sv">'+answered+'</div><div class="sl">Answered</div></div>';
h+='<div class="sc"><div class="sv">'+mastered+'</div><div class="sl">Mastered</div></div>';
h+='<div class="sc"><div class="sv">'+weak+'</div><div class="sl">Weak</div></div>';
h+='</div>';
var ps=acc>=72?'background:#f0fdf4;color:#34c759':'background:#fff5f5;color:#ff3b30';
var pt=acc>=72?'\u2713 On track (72% pass)':'\u26A0 Below 72% pass threshold';
h+='<div style="margin-bottom:20px;padding:10px;border-radius:8px;font-size:13px;text-align:center;'+ps+'">'+pt+'</div>';
h+='<div class="catbar">';
for(var ci=0;ci<CATS.length;ci++){
var cq=Q.filter(function(q){return q.c===ci;});
var cr=0,ct=0;
for(var j=0;j<cq.length;j++){var a=ST.ans[cq[j].i];if(a){cr+=a.r;ct+=a.t;}}
var cp=ct>0?Math.round((cr/ct)*100):0;
h+='<div class="catrow"><span class="lbl">'+esc(catShort(ci))+'</span><div class="bar"><div class="fill" style="width:'+cp+'%"></div></div><span class="pct">'+cp+'%</span></div>';
}
h+='</div>';
h+='<div id="startbtn" class="btn bp" style="width:100%;justify-content:center;margin-top:20px">Start Quiz</div>';
h+='</div></div>';
el.innerHTML=h;
document.getElementById("startbtn").onclick=function(){ST.v="quiz";render();};
}
function rQuiz(el){
var fq=getF();
if(fq.length===0){
el.innerHTML='<div class="hdr"><h1>No Results</h1></div><div class="cnt"><div class="card"><p>No questions match filters.</p><div id="resetbtn" class="btn bp" style="margin-top:12px">Reset</div></div></div>';
document.getElementById("resetbtn").onclick=function(){ST.fcat="all";ST.fst="all";ST.idx=0;render();};
return;
}
if(ST.idx>=fq.length)ST.idx=0;
if(ST.idx<0)ST.idx=fq.length-1;
var q=fq[ST.idx];
var rec=ST.ans[q.i];
var answered=rec&&rec.last!==undefined;
var h='<div class="hdr"><h1>Q '+(ST.idx+1)+'/'+fq.length+'</h1><div id="homebtn" class="btn bs">\u2630</div></div>';
h+='<div class="cnt">';
h+='<div class="tabs">';
var tabs=["all","unanswered","wrong","weak","bookmarked"];
var tLbl=["All","New","Wrong","Weak","\u2605"];
for(var ti=0;ti<tabs.length;ti++){h+='<div class="tab'+(ST.fst===tabs[ti]?" on":"")+'" data-tab="'+tabs[ti]+'">'+tLbl[ti]+'</div>';}
h+='</div>';
h+='<div class="flt">';
h+='<span class="chip'+(ST.fcat==="all"?" on":"")+'" data-cat="all">All</span>';
for(var ci=0;ci<CATS.length;ci++){h+='<span class="chip'+(ST.fcat===String(ci)?" on":"")+'" data-cat="'+ci+'">'+esc(catShort(ci))+'</span>';}
h+='</div>';
h+='<div class="card" style="position:relative">';
h+='<span class="bk" id="bkbtn">'+(ST.bm[q.i]?"\u2605":"\u2606")+'</span>';
h+='<div class="qmeta"><span class="qnum">Q'+q.n+'</span><span class="qcat">'+esc(CATS[q.c])+'</span></div>';
if(rec){h+='<div style="font-size:11px;color:#86868b;margin-bottom:8px">Attempts: '+rec.t+' | Correct: '+rec.r+'</div>';}
h+='<div class="qtext">'+esc(q.q)+'</div>';
h+='<div class="opts">';
var keys=Object.keys(q.o);
var cl=q.a.trim().split(/\s+/);
for(var ki=0;ki<keys.length;ki++){
var k=keys[ki];
var cls="opt";var extra="";
if(answered){
if(cl.indexOf(k)>=0){cls+=" ok";extra=hl(q.o[k],q.ch&&q.ch[k]?q.ch[k]:[],"hlok");}
else if(rec.last===k){cls+=" no";extra=hl(q.o[k],q.wh&&q.wh[k]?q.wh[k]:[],"hlno");}
else{cls+=" dim";extra=esc(q.o[k]);}
}else{extra=esc(q.o[k]);}
h+='<div class="'+cls+'" data-key="'+k+'"><span class="ltr">'+k+'.</span><span>'+extra+'</span></div>';
}
h+='</div>';
if(answered){
var wr=cl.indexOf(rec.last)>=0;
h+='<div class="exp show '+(wr?"expok":"expno")+'"><b>'+(wr?"\u2713 Correct":"\u2717 Incorrect - Answer: "+cl.join(", "))+'</b>'+esc(q.e)+'</div>';
h+='<div id="retrybtn" class="retry">Retry</div>';
}
h+='</div>';
h+='<div class="nav">';
h+='<div id="prevbtn" class="btn bs"'+(ST.idx<=0?' style="opacity:.3"':'')+'>\u2190 Prev</div>';
h+='<div id="nextbtn" class="btn bp"'+(ST.idx>=fq.length-1?' style="opacity:.3"':'')+'>\u2192 Next</div>';
h+='</div></div>';
el.innerHTML=h;
document.getElementById("homebtn").onclick=function(){ST.v="home";render();};
document.getElementById("bkbtn").onclick=function(){ST.bm[q.i]=!ST.bm[q.i];save();render();};
var pb=document.getElementById("prevbtn");
if(pb&&ST.idx>0)pb.onclick=function(){ST.idx--;render();};
var nb=document.getElementById("nextbtn");
if(nb&&ST.idx<fq.length-1)nb.onclick=function(){ST.idx++;render();};
var rb=document.getElementById("retrybtn");
if(rb)rb.onclick=function(){delete ST.ans[q.i].last;save();render();};
var tabEls=el.querySelectorAll(".tab");
for(var i=0;i<tabEls.length;i++){(function(t){t.onclick=function(){ST.fst=t.getAttribute("data-tab");ST.idx=0;render();};})(tabEls[i]);}
var chipEls=el.querySelectorAll(".chip");
for(var i=0;i<chipEls.length;i++){(function(c){c.onclick=function(){ST.fcat=c.getAttribute("data-cat");ST.idx=0;render();};})(chipEls[i]);}
if(!answered){
var optEls=el.querySelectorAll(".opt");
for(var i=0;i<optEls.length;i++){(function(o){o.onclick=function(){pick(q.i,o.getAttribute("data-key"));};})(optEls[i]);}
}
}
function pick(qid,letter){
var q=null;
for(var i=0;i<Q.length;i++){if(Q[i].i===qid){q=Q[i];break;}}
if(!q)return;
var cl=q.a.trim().split(/\s+/);
var ok=cl.indexOf(letter)>=0;
if(!ST.ans[qid])ST.ans[qid]={t:0,r:0};
ST.ans[qid].t++;
if(ok)ST.ans[qid].r++;
ST.ans[qid].last=letter;
save();render();
}
setTimeout(init,0);

</script>
</body>
</html>
